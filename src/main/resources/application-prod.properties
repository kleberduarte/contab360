# ============================================================
# Perfil PRODUCAO — ative com: --spring.profiles.active=prod
# Todas as variaveis sensiveis vem de variaveis de ambiente.
# ============================================================

# Seguranca: nunca resetar senhas demo em producao
contab360.demo-reset-passwords=false

# Banco de dados — credenciais obrigatórias via env
spring.datasource.url=jdbc:mysql://${CONTAB360_MYSQL_HOST:localhost}:${CONTAB360_MYSQL_PORT:3306}/contab360?useSSL=true&requireSSL=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=${CONTAB360_MYSQL_USER}
spring.datasource.password=${CONTAB360_MYSQL_PASSWORD}

# JPA: nunca alterar schema automaticamente em producao
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Upload: diretório absoluto no servidor
app.upload.dir=${CONTAB360_UPLOAD_DIR:/var/contab360/uploads/pendencias}

# Porta interna (nginx faz proxy para esta porta)
server.port=8080

# Proxy reverso: respeitar headers do nginx (X-Forwarded-*)
server.forward-headers-strategy=framework

# Logs: nivel INFO em producao
logging.level.root=INFO
logging.level.com.contabilidade=INFO
logging.file.name=${CONTAB360_LOG_DIR:/var/log/contab360}/app.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
