# ============================================================
# Perfil PRODUCAO — ative com: --spring.profiles.active=prod
# Todas as variaveis sensiveis vem de variaveis de ambiente.
# ============================================================

# Seguranca: nunca resetar senhas demo em producao
contab360.demo-reset-passwords=false

# Banco de dados — Railway pode expor URL pronta (MYSQL_URL) ou variáveis separadas.
# Ordem: MYSQL_URL -> vars separadas Railway -> vars customizadas CONTAB360_MYSQL_*.
# Railway não expõe SSL no plano atual (Ssl_cipher vazio) — useSSL=false obrigatório.
# allowPublicKeyRetrieval=false mantido para reduzir superfície de ataque MITM.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://${MYSQLHOST:${CONTAB360_MYSQL_HOST:localhost}}:${MYSQLPORT:${CONTAB360_MYSQL_PORT:3306}}/${MYSQLDATABASE:contab360}?useSSL=false&allowPublicKeyRetrieval=false&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8}
spring.datasource.username=${MYSQLUSER:${CONTAB360_MYSQL_USER}}
spring.datasource.password=${MYSQLPASSWORD:${CONTAB360_MYSQL_PASSWORD}}

# JPA: nunca alterar schema automaticamente em producao
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Upload: Railway tem filesystem efemero — use volume persistente ou object storage
app.upload.dir=${CONTAB360_UPLOAD_DIR:/var/contab360/uploads/pendencias}

# Porta — Railway injeta PORT automaticamente
server.port=${PORT:8080}

# Proxy reverso: respeitar headers do Railway/Vercel
server.forward-headers-strategy=framework

# CORS — origens separadas por virgula (ex: https://contab360.vercel.app)
contab360.cors.origins=${CONTAB360_CORS_ORIGINS:https://contab360.vercel.app}

# Logs: nivel INFO em producao
logging.level.root=INFO
logging.level.com.contabilidade=INFO
# Em containers Railway, /var/log pode não ter permissão de escrita.
logging.file.name=${CONTAB360_LOG_DIR:/tmp}/contab360-app.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
