# Perfil de desenvolvimento local — ative com: --spring.profiles.active=dev
# Nunca usar em produção.

# Senhas demo resetadas a cada subida (facilita testes locais)
contab360.demo-reset-passwords=true
# Não criar usuários automaticamente ao subir (habilite apenas se quiser massa demo).
contab360.auth.seed.enabled=false

# CORS: permite Vite dev server rodando em portas locais
contab360.cors.origins=https://contab360.vercel.app,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173

# Subcategorias fiscais (dev): separa tipos de nota no carrossel.
