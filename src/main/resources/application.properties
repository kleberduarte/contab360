spring.application.name=contab360

# Usuários demo (contador@, cliente@, cliente2@): ao subir a app, recria hash da senha 123456. Desative em produção.
contab360.demo-reset-passwords=true

# MySQL — usa variaveis do projeto para evitar conflito com env global
# CONTAB360_MYSQL_USER / CONTAB360_MYSQL_PASSWORD
spring.datasource.url=jdbc:mysql://localhost:3306/contab360?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=${CONTAB360_MYSQL_USER:root}
spring.datasource.password=${CONTAB360_MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Integração SEFAZ (NFe estadual): SIMULACAO gera chave/protocolo fictícios + PDF DANFE de demonstração.
# REAL usa stub até implementar cliente SOAP + certificado (ver AutorizacaoFiscalRealStub).
contab360.sefaz.modo=SIMULACAO
contab360.sefaz.ambiente=HOMOLOGACAO
contab360.sefaz.certificado-path=
contab360.sefaz.certificado-senha=
contab360.sefaz.nfe-autorizacao-url=

# NFS-e municipal (Prefeitura de São Paulo) — independente do bloco sefaz acima.
# Padrão seguro: integração PMSP desligada — nunca usa o cliente SOAP real (mesmo se modo=REAL).
# Para transmitir de fato: integracao-pmsp-ativa=true + modo=REAL + transmissao-habilitada=true + endpoint + certificado.
# SIMULACAO: chave/protocolo fictícios (demo).
# DESLIGADO: grava nota sem autorização municipal (sem chave/protocolo).
# REAL: só após integracao-pmsp-ativa=true; transmissão só se transmissao-habilitada=true (senão NFSE_REAL_PENDENTE).
contab360.nfse.integracao-pmsp-ativa=false
contab360.nfse.modo=SIMULACAO
contab360.nfse.sao-paulo.transmissao-habilitada=false
contab360.nfse.sao-paulo.ambiente=HOMOLOGACAO
contab360.nfse.sao-paulo.endpoint-envio=
contab360.nfse.sao-paulo.endpoint-consulta-lote=
contab360.nfse.sao-paulo.endpoint-cancelamento=
# Se vazios, reutilizam contab360.sefaz.certificado-path / certificado-senha
contab360.nfse.sao-paulo.certificado-path=
contab360.nfse.sao-paulo.certificado-senha=
# SOAP: conferir nomes exatos no WSDL PMSP (campos abaixo costumam aparecer em integrações Paulistana legado).
contab360.nfse.sao-paulo.soap-namespace=http://www.prefeitura.sp.gov.br/nfe
contab360.nfse.sao-paulo.soap-request-element-local=RecepcionarLoteRpsRequest
contab360.nfse.sao-paulo.soap-mensagem-xml-element=MensagemXML
contab360.nfse.sao-paulo.soap-versao-elemento=1
contab360.nfse.sao-paulo.soap-protocolo=1.2
contab360.nfse.sao-paulo.soap-action=
# Layout lote (ABRASF como base; troque namespace/versao se o manual exigir outro schema).
contab360.nfse.sao-paulo.abrasf-namespace=http://www.abrasf.org.br/nfse.xsd
contab360.nfse.sao-paulo.abrasf-versao-layout=2.03
contab360.nfse.sao-paulo.codigo-municipio-ibge=3550308
contab360.nfse.sao-paulo.serie-rps-padrao=RPS
contab360.nfse.sao-paulo.pular-assinatura-xml=false
contab360.nfse.sao-paulo.assinatura-sha1=true

# Front-end estático e API na mesma origem (porta 8080)
server.port=8080
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# Upload de documentos de pendências
app.upload.dir=uploads/pendencias
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
