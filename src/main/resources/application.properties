spring.application.name=contab360

# MySQL — usuario/senha: defina MYSQL_USER e MYSQL_PASSWORD (env) ou use mysql-local.env com iniciar.bat
spring.datasource.url=jdbc:mysql://localhost:3306/contabilidade_pj?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Front-end estático e API na mesma origem (porta 8080)
server.port=8080

# Upload de documentos de pendências
app.upload.dir=uploads/pendencias
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
