spring.application.name=sistema-contabilidade-pj

# MySQL — ajuste usuário, senha e nome do banco
spring.datasource.url=jdbc:mysql://localhost:3306/contabilidade_pj?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Front-end estático e API na mesma origem (porta 8080)
server.port=8080
